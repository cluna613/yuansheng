<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感底片|原生家庭与恋爱模式档案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f0e8;
            --text-color: #2c2c2c;
            --accent-color: #8c3a3a; 
            --border-color: #1a1a1a;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png'); 
        }

        .film-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            border-left: 18px solid var(--border-color);
            border-right: 18px solid var(--border-color);
            position: relative;
            background: var(--bg-color);
            padding: 40px 24px;
            box-shadow: 0 0 40px rgba(0,0,0,0.15);
        }

        .film-container::before, .film-container::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            width: 10px;
            background-image: radial-gradient(circle, #fff 4px, transparent 5px);
            background-size: 10px 40px;
            background-position: center;
            opacity: 0.2;
            z-index: 10;
        }
        .film-container::before { left: -14px; }
        .film-container::after { right: -14px; }

        .screen { display: none; animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-retro {
            border: 1px solid var(--text-color);
            padding: 14px 28px;
            transition: all 0.3s;
            background: transparent;
            cursor: pointer;
            display: inline-block;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .btn-retro:hover {
            background: var(--text-color);
            color: var(--bg-color);
            transform: scale(1.02);
        }

        .option-card {
            border: 1px solid #d1ccc0;
            padding: 18px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.4);
            line-height: 1.6;
        }

        .option-card:hover {
            border-color: var(--accent-color);
            background: #fff;
            transform: translateX(8px);
            box-shadow: -4px 4px 0 var(--accent-color);
        }

        .progress-bar {
            height: 1px;
            background: #d1ccc0;
            width: 100%;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-inner {
            height: 3px;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.4s;
            position: absolute;
            top: -1px;
        }

        .result-title {
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            text-align: center;
            border-bottom: 1px double var(--accent-color);
            padding-bottom: 10px;
        }

        .result-content {
            font-size: 0.95rem;
            line-height: 1.9;
            text-align: justify;
            color: #333;
            margin-bottom: 2rem;
            white-space: pre-line;
        }

        .prescription-box {
            background: rgba(140, 58, 58, 0.05);
            border: 1px dashed var(--accent-color);
            padding: 20px;
            margin-top: 30px;
            position: relative;
        }

        .prescription-box::before {
            content: "Rx";
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--bg-color);
            padding: 0 10px;
            color: var(--accent-color);
            font-weight: bold;
            font-style: italic;
        }

        @media (max-width: 640px) {
            .film-container { border-left-width: 12px; border-right-width: 12px; }
            .film-container::before { left: -11px; }
            .film-container::after { right: -11px; }
        }
    </style>
</head>
<body>

<div class="film-container">
    <div id="welcome-screen" class="screen active text-center">
        <p class="text-xs tracking-[0.3em] mb-6 opacity-50">ARCHIVE OF SOUL / 潜意识档案</p>
        <div class="flex flex-col items-start gap-6 mb-12">
  <h1 class="text-2xl font-bold leading-tight m-0">
    <span class="text-red-800 text-2xl">情感底片</span>
  </h1>
  <h1 class="text-2xl font-bold leading-tight m-0">
    <span class="text-red-800 text-3xl">原生家庭与恋爱模式档案</span>
  </h1>
</div>
        <div class="mb-12">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=500" class="grayscale sepia brightness-90 rounded-sm shadow-xl" alt="vintage film">
        </div>
        <p class="text-sm leading-8 mb-10 px-4 opacity-80">
            那些突如其来的强烈心动，<br>究竟是灵魂的共鸣，还是童年脚本的重演？<br>让我们在显影液中，看清爱里的隐形巨手。
        </p>
        <button class="btn-retro" onclick="startQuiz()">开启显影过程</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar"><div id="progress" class="progress-inner"></div></div>

        <div id="options-container"></div>

        </div>
        <button class="btn-retro w-full mt-12 mb-8" onclick="location.reload()">重新显影</button>
    </div>
</div>

<script>
    // 25道题库设计，确保 saver 选项更具吸引力，且整体概率平均
    const questions = [
        { q: "在社交场合，你第一眼会被哪种人吸引？", options: [
            { t: "自带光芒、情绪稳定的中心人物", val: "secure" },
            { t: "独来独往、看起来很有故事的清冷者", val: "avoidant" },
            { t: "充满掌控欲、让人又爱又怕的强者", val: "fearful" },
            { t: "神情略显疲惫或脆弱、让人想去保护的人", val: "saver" }
        ]},
        { q: "童年打破昂贵的碗时，你脑海中最深的记忆是？", options: [
            { t: "父母担心的询问和共同清理的背影", val: "secure" },
            { t: "一种死一般的寂静，没人理会你的恐惧", val: "avoidant" },
            { t: "自己立刻道歉、试图通过表现好来抵消错误", val: "pleaser" },
            { t: "父母争吵，你不得不去安慰那个情绪失控的人", val: "saver" }
        ]},
        { q: "对方在初次约会安排得无懈可击，你的本能反应是？", options: [
            { t: "享受这种被温柔对待的秩序感", val: "secure" },
            { t: "感到亏欠，立刻盘算下一次要如何回报", val: "pleaser" },
            { t: "感到被冒犯，担忧对方会试图控制你", val: "avoidant" },
            { t: "担心这只是假象，他在背后有其他目的", val: "fearful" }
        ]},
        { q: "关于“承诺”，你更倾向于认为它是？", options: [
            { t: "长久经营后的必然果实", val: "secure" },
            { t: "一种随时会变质的情绪幻觉", val: "anxious" },
            { t: "枷锁，会让我失去逃生的通道", val: "avoidant" },
            { t: "我必须背负的沉重十字架，一旦给出绝不背叛", val: "saver" }
        ]},
        { q: "当伴侣表现出强烈的脆弱或失败时，你会？", options: [
            { t: "感到这正是我存在的意义，想全力拉他出来", val: "saver" },
            { t: "感到慌乱，害怕被他的负能量拖入深渊", val: "anxious" },
            { t: "感到尴尬，本能地想要回避或让他冷静", val: "avoidant" },
            { t: "温柔地倾听并提供稳定的支持", val: "secure" }
        ]},
        { q: "在关系中，如果对方评价你“很懂事”，你会？", options: [
            { t: "感到深深的自豪，认为这是最高评价", val: "pleaser" },
            { t: "感到一阵心酸，觉得自己消失了", val: "fearful" },
            { t: "感到心安，觉得这段关系很稳固", val: "secure" },
            { t: "感到警惕，怕对方因此而忽视我的需求", val: "anxious" }
        ]},
        { q: "对方断联几小时，你的大脑剧本通常是？", options: [
            { t: "反复翻看聊天记录，寻找自己做错的证据", val: "anxious" },
            { t: "告诉自己他可能出事了，并想办法解决", val: "saver" },
            { t: "他也该有自己的空间，正好我也忙", val: "avoidant" },
            { t: "既然他不理我，我也可以不理他", val: "fearful" }
        ]},
        { q: "你最难以忍受伴侣的哪种状态？", options: [
            { t: "他不需要我，他一个人也能过得很好", val: "saver" },
            { t: "他总是对我冷淡，拒绝深度交流", val: "anxious" },
            { t: "他总是指责我，让我觉得自己一无是处", val: "pleaser" },
            { t: "他对我太粘人，让我感到窒息", val: "avoidant" }
        ]},
        { q: "关于金钱和付出，你的信条是？", options: [
            { t: "我习惯为对方解决所有麻烦，包括财务压力", val: "saver" },
            { t: "AA制或相对公平，互不亏欠最安全", val: "avoidant" },
            { t: "我总是担心自己给的不够多，被对方嫌弃", val: "pleaser" },
            { t: "根据共同的目标合理规划，互相信任", val: "secure" }
        ]},
        { q: "你发现自己反复被哪种类型的“痛点”击中？", options: [
            { t: "被忽视的委屈感", val: "anxious" },
            { t: "不被需要的虚无感", val: "saver" },
            { t: "被束缚的窒息感", val: "avoidant" },
            { t: "被欺骗的愤怒感", val: "fearful" }
        ]},
        { q: "当一段关系变得非常顺利且甜蜜时，你会？", options: [
            { t: "感到这种平静很无趣，想折腾点什么", val: "anxious" },
            { t: "怀疑这不真实，随时准备迎接灾难", val: "fearful" },
            { t: "理所当然地享受这份美好", val: "secure" },
            { t: "更加努力地讨好对方，生怕对方离开", val: "pleaser" }
        ]},
        { q: "面对伴侣的负面情绪，你的第一冲动是？", options: [
            { t: "立刻反省：“是不是我哪里没做好？”", val: "pleaser" },
            { t: "立刻想出 100 种解决方案来“修好”他", val: "saver" },
            { t: "本能地想要切断联系，等他变好再出现", val: "avoidant" },
            { t: "陪伴他，并相信他有处理情绪的能力", val: "secure" }
        ]},
        { q: "童年家里的气氛更像是？", options: [
            { t: "战场，你必须随时警惕飞来的横祸", val: "fearful" },
            { t: "剧场，你必须表现完美才有奖赏", val: "pleaser" },
            { t: "医院，你总是在照顾那个生病的灵魂", val: "saver" },
            { t: "港湾，温暖且有边界", val: "secure" }
        ]},
        { q: "你认为爱情中最重要的能力是？", options: [
            { t: "包容与接纳对方的所有不完美", val: "secure" },
            { t: "保护自己不被对方完全吞噬", val: "avoidant" },
            { t: "能精准感知并满足对方的所有需求", val: "pleaser" },
            { t: "具备救对方于水火、成就对方的能量", val: "saver" }
        ]},
        { q: "当对方夸你“你太棒了，没有你我真不知道怎么办”，你会？", options: [
            { t: "感到无比的充实和自我的价值被证实", val: "saver" },
            { t: "感到受宠若惊，觉得没他说的那么好", val: "pleaser" },
            { t: "感到压力，害怕之后承载不了这份期待", val: "anxious" },
            { t: "感到欣慰，这是一种良性的互动", val: "secure" }
        ]},
        { q: "关于“秘密”，你的态度是？", options: [
            { t: "他所有的秘密我都要知道，我才能帮他", val: "saver" },
            { t: "我守口如瓶，也不希望他打听我的过去", val: "avoidant" },
            { t: "只要他想听，我愿意全盘托出以表忠诚", val: "pleaser" },
            { t: "保留适当的个人边界对彼此都好", val: "secure" }
        ]},
        { q: "当对方情绪爆发指责你时，你会？", options: [
            { t: "陷入极度的自我怀疑和崩溃中", val: "anxious" },
            { t: "像个冰冷的局外人一样看着他表演", val: "avoidant" },
            { t: "不惜一切代价（即使自残或下跪）求他停下", val: "fearful" },
            { t: "本能地觉得他在求救，想抱抱那个受伤的他", val: "saver" }
        ]},
        { q: "假如对方突然说“我们不合适”，你会？", options: [
            { t: "立刻寻找补救方案，试图“治愈”这段关系", val: "saver" },
            { t: "问清原因，如果是事实就体面放手", val: "secure" },
            { t: "疯狂纠缠，哪怕对方厌恶也不放手", val: "anxious" },
            { t: "冷笑一声，转头就走，永不联络", val: "avoidant" }
        ]},
        { q: "在朋友圈，你倾向于展示？", options: [
            { t: "岁月静好，平淡真实的日常", val: "secure" },
            { t: "完全不发，不希望被任何人窥探生活", val: "avoidant" },
            { t: "精心雕琢出的、让对方有面子的画面", val: "pleaser" },
            { t: "带有一种拯救色彩或深刻深沉的内容", val: "saver" }
        ]},
        { q: "如果对方和你冷战，你会？", options: [
            { t: "反复发送消息，直到对方回复为止", val: "anxious" },
            { t: "比他更冷，直到他主动认错", val: "fearful" },
            { t: "主动给台阶，化解这份沉重的僵局", val: "saver" },
            { t: "等待时机成熟，再进行理性的沟通", val: "secure" }
        ]},
        { q: "面对“索取”，你的感受是？", options: [
            { t: "索取让我感到被需要，我乐于给予", val: "saver" },
            { t: "索取让我感到被侵犯，我会下意识躲开", val: "avoidant" },
            { t: "我不敢索取，怕成为别人的负担", val: "pleaser" },
            { t: "有来有往是健康的，我心安理得地索取", val: "secure" }
        ]},
        { q: "你理想中的伴侣关系像？", options: [
            { t: "两棵并排站立、根系交错的树", val: "secure" },
            { t: "在冰冷深海中互相取暖的两条鱼", val: "fearful" },
            { t: "医生与病人，我在帮你逐渐康复", val: "saver" },
            { t: "主人与宠物，我永远忠诚且听话", val: "pleaser" }
        ]},
        { q: "当对方哭泣时，你内心升起的第一个念头是？", options: [
            { t: "我该怎么做才能停止他的痛苦？", val: "saver" },
            { t: "他的哭泣是对我的指责吗？", val: "anxious" },
            { t: "真受不了这种剧烈的情绪", val: "avoidant" },
            { t: "感受到他的悲伤，并陪他一起呆着", val: "secure" }
        ]},
        { q: "关于“改变对方”，你认为？", options: [

    const results = {
        secure: {
            k: "恒温守望者",
            d: `你的内心拥有一片波澜不惊的深海，那是童年时期父母给予的“心理安全基地”所留下的回声。在你的潜意识里，爱不是一种稀缺资源，而是一种可以流动的能量。你对他人的心动信号，通常源于一种“健康的共鸣”——你会被那些同样稳定、自洽且真诚的灵魂吸引。你不需要通过极端的冲突来确认对方在意你，也不需要通过卑微的顺从来换取和平。\n\n对你而言，亲密关系是一场“强强联手”的探险，而非两个残缺个体的缝补。这种松弛感让你在面对矛盾时，具备极高的心理韧性。你不会轻易地将对方的负面情绪解读为对自己的攻击，也不会在被爱时感到受宠若惊。你深知自己值得被爱，这种底气让你在爱中既能深情投入，又能保持独立的自我。你的人生脚本中，恋爱是锦上添花的点缀，你寻找的是那个能和你一起看风景的人，而非一个救赎者。你的爱像冬日的壁炉，稳定、持久且温厚。`,
            rx: "1. 警惕“平淡”陷阱：因为你习惯了稳定，有时会误将健康的平静视为乏味。试着与伴侣一起创造“共同的巅峰体验”。\n2. 照顾伴侣的阴影：你可能难以完全理解不安全感较强的伴侣，请保持耐心，用你的“恒温”去慢慢修补他们的裂痕。"
        },
        avoidant: {
            k: "孤岛漫游者",
            d: `你像是一座在极夜中独自漂流的冰山，壮丽却拒绝被靠近。在原生家庭的叙事里，你可能过早地学会了“懂事”和“情感自足”。或许是曾经的求助被忽视，或者是过度的控制让你感到窒息，你潜意识里将“亲密”与“危险”划上了等号。你的心动信号往往在“安全距离”内最强烈——你会被那些优秀、克制、带有一丝疏离感的人吸引，因为他们不会立刻打破你的防御机制。\n\n一旦关系进入需要深度联结的阶段，你体内的警报器就会轰鸣。你会通过挑剔对方的缺点、故意冷淡或者沉溺于工作来拉开距离。你内心的那个小孩在窃窃私语：“只要我不抱期待，我就不会失望。”你用理智构筑了一座精美绝伦的围城，将所有的脆弱都锁在最深处。你习惯于在一段感情快要失控时，主动按下暂停键。你的孤独是一种勋章，也是一种诅咒，你在人群中渴望被理解，却在有人试图走进你的灵魂时感到汗毛直立。`,
            rx: "1. 练习“脆弱练习”：尝试每周向伴侣分享一件你感到羞耻或脆弱的小事。暴露弱点是建立深层联结的唯一路径。\n2. 识别“退行信号”：当你想要逃离时，停下来问问自己：“我是在逃避那个人，还是在逃避那种失控的感觉？”"
        },
        anxious: {
            k: "燃灯寻觅者",
            d: `你在爱里像是一个永恒的守夜人，不断划燃火柴去确认对方的存在。由于童年得到的情感是“间歇性强化”的，你形成了极其灵敏的情感雷达。你对他人的心动信号往往是一种“饥渴的捕捉”，你会被那些能提供强烈情绪价值、甚至带有一点掌控欲的人吸引。在你的逻辑里，强烈的波动才等同于强烈的爱。\n\n恋爱后的你，心智会被一种名为“饥饿”的情绪占据。你会反复推敲对方的每一个标点符号，对已读不回有着近乎生理性的焦虑。你通过过度付出、时刻粘人来换取短暂的安全感，却又在对方稍微疏忽时陷入剧烈的崩塌。你其实不是在谈恋爱，而是在寻找那个能永远接住你、不离开你的支点。你将自我的价值完全建立在他人的评价之上。你内心深处始终盘旋着一个疑问：如果我不够努力，他还会留下来吗？`,
            rx: "1. 建立“自愈岛屿”：培养至少一个不需要伴侣参与、能让你获得成就感的硬核爱好。找回你的“自我中心”。\n2. 延时反应练习：在焦虑发作想要疯狂轰炸消息时，强制等待20分钟，练习通过自我对话来安抚那个受惊的小孩。"
        },
        fearful: {
            k: "琉璃防御者",
            d: `你拥有一种令人心碎的矛盾感，像是一件精美却布满裂纹的琉璃，渴望被紧密相拥，却又在被靠近时感到灼伤。原生家庭可能曾是你恐惧的来源。这导致你对他人的心动信号充满了“悲剧色彩”：你往往会被那些迷人但危险、甚至能带给你伤害的人吸引。这种熟悉的痛感，会让你产生一种“这就是宿命”的错觉。\n\n你在恋爱中是一个极端的矛盾体：你极度渴望依恋，却又在亲密感提升时感到灭顶的威胁。上一秒你还沉浸在温柔中，下一秒就可能因为一个莫须有的怀疑而想要推开一切。你就像一个在沙漠中渴极了的人，好不容易找到了水源，却因为害怕水里有毒而迟迟不敢饮用。这种内耗让你在每一场恋爱中都像是在经历一场战争，你不仅在和对方博弈，更是在和自己破碎的防御系统交火。`,
            rx: "1. 寻找“高一致性”伴侣：你需要一个行为极度可预测、能提供百分之百透明度的伴侣。避开那些忽冷忽热的“玩家”。\n2. 专业疗愈：你的模式往往涉及深层的创伤，建议结合心理咨询，在安全的环境下重新建立对“安全感”的认知。"
        },
        saver: {
            k: "圣杯拯救者",
            d: `你的心动信号极其特殊且带有神性色彩：你几乎不被“完整的人”吸引，你总是精准地捕捉到那些“破碎的灵魂”。在童年，你可能扮演了家庭中的“情绪调解员”，习惯了通过解决他人的痛苦来确认自己的价值。你潜意识里认为：只有当我对他有用时，我才是安全的、被需要的。\n\n在恋爱中，你往往在扮演“全能母亲”或“救世英雄”的角色。你试图修补对方的童年，替对方解决危机。然而，这种基于“怜悯”和“修补”的爱是极其危险的。当你将对方修补好之后，你往往会感到一种莫名的失落。你其实是在通过拯救别人，来试图拯救当年那个面对父母矛盾却无能为力的自己。你真正的心动信号，其实是某种“求救信号”的回响。`,
            rx: "1. 停止“扶贫式恋爱”：下次心动时问自己：“如果没有这些困难，我还会被这个人吸引吗？”\n2. 练习“被服务”：允许伴侣为你付出，练习心安理得地接受照顾，而不是立刻想方设法“还回去”。"
        },
        pleaser: {
            k: "幕布隐匿者",
            d: `你是一个情感的调色盘，为了不引起冲突，你习惯于将自己调成对方喜欢的颜色。你的心动信号往往源于“被选中的喜悦”——只要有人对你展现出强烈的偏爱，你就会迅速调整自己的频率去适配对方。在原生家庭中，你的存在感往往依赖于“表现良好”和“听话”，这种顺从已经内化成了你的人格底色。\n\n在恋爱里，你最怕空气突然静止。你会为了迎合对方的胃口、爱好甚至价值观而不断切割真实的自我。久而久之，你成为了伴侣最完美的镜像，却在某个深夜感到一种剧烈的虚无感：在这一段关系里，我到底在哪里？你总是在推测对方的需求并先行满足，这种过度补偿让对方感到窒息，也让你感到自我的枯竭。你的课题是找回那个被你藏起来的、真实而有棱角的自我。`,
            rx: "1. 建立“愤怒清单”：每天记录一件令你不爽的小事，并练习用中性的语言表达出来。愤怒是找回自我边界的最好工具。\n2. 拒绝“读心术”：停止猜测对方想要什么，强迫自己等对方明确表达需求后再行动。"
        }
    };

    let currentStep = 0;
    let scores = {};

    function startQuiz() {
        showScreen('quiz-screen');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentStep];
        document.getElementById('question-number').innerText = `FRAGMENT NO.${String(currentStep + 1).padStart(2, '0')}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.innerText = opt.t;
            div.onclick = () => selectOption(opt.val);
            container.appendChild(div);
        });
        document.getElementById('progress').style.width = `${((currentStep) / questions.length) * 100}%`;
    }

    function selectOption(val) {
        scores[val] = (scores[val] || 0) + 1;
        if (currentStep < questions.length - 1) {
            currentStep++;
            showQuestion();
        } else {
            showLoading();
        }
    }

    function showLoading() {
        showScreen('loading-screen');
        setTimeout(showResult, 2600);
    }

    function showResult() {
        const topResult = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const res = results[topResult];
        
        document.getElementById('res-keyword').innerText = res.k;
        document.getElementById('res-desc').innerText = res.d;
        document.getElementById('res-rx').innerText = res.rx;
        showScreen('result-screen');
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
    }
</script>
